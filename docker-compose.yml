version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.4
    container_name: gdelt_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.4
    container_name: gdelt_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  neo4j:
    image: neo4j:5
    container_name: gdelt_neo4j
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["graph-data-science"]
    volumes:
      - neo4j_data:/data

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: gdelt_api
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
    volumes:
      - ./ml:/app/ml
    depends_on:
      - neo4j
    command: >
      sh -c "sleep 10 && uvicorn main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gdelt_frontend
    ports:
      - "8080:80"
    depends_on:
      - api

  producer:
    build:
      context: ./streaming
      dockerfile: Dockerfile
    container_name: gdelt_producer
    depends_on:
      - kafka
    environment:
      - PYTHONUNBUFFERED=1
    command: ["python", "producer.py"]

  consumer:
    build:
      context: ./streaming
      dockerfile: Dockerfile
    container_name: gdelt_consumer
    depends_on:
      - kafka
      - neo4j
      - api
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - KAFKA_BROKER=kafka:29092
      - API_URL=http://api:8000
      - PYTHONUNBUFFERED=1
    command: ["python", "consumer.py"]

volumes:
  neo4j_data:
